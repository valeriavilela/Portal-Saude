spring.application.name=saude
spring.datasource.url=jdbc:mysql://localhost:3306/agendamento_saude
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de conexões (HikariCP - já vem com Spring Boot)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=20000

# Mostrar SQL no console (útil durante desenvolvimento)
spring.jdbc.template.query-timeout=30
logging.level.org.springframework.jdbc=DEBUG